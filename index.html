<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Powered by Skyward</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="https://cdn.discordapp.com/attachments/1263666228153552948/1268261883077726330/image.png?ex=66abc86c&is=66aa76ec&hm=bb3473e22926e3c241481c249fab76585211a9c02dc112624cfdacd62ac46ad7&" type="image/png">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="server" id="action">
                <div class="server-icon">
                    <i class="fas fa-fist-raised"></i>
                    <span>Action</span>
                </div>
            </div>
            <div class="server" id="adventure">
                <div class="server-icon">
                    <i class="fas fa-hiking"></i>
                    <span>Adventure</span>
                </div>
            </div>
            <div class="server" id="puzzle">
                <div class="server-icon">
                    <i class="fas fa-brain"></i>
                    <span>Puzzle</span>
                </div>
            </div>
            <div class="server" id="rpg">
                <div class="server-icon">
                    <i class="fas fa-dice-d20"></i>
                    <span>RPG</span>
                </div>
            </div>
            <div class="server" id="horror">
                <div class="server-icon">
                    <i class="fas fa-ghost"></i>
                    <span>Horror</span>
                </div>
            </div>
        </div>
        <div class="main-content">
            <div class="header">
                <h1>Welcome to CCV</h1>
            </div>
            <div class="content welcome-content">
                <p>Thanks for choosing CCV</p>
                <img src="https://imgs.search.brave.com/oWAEoL6rOOwaj2nZPvGLLTV5XYX5o5SSbdceVMo9zVI/rs:fit:500:0:0:0/g:ce/aHR0cHM6Ly9paDEu/cmVkYnViYmxlLm5l/dC9pbWFnZS42ODI2/NzA2MTIuNDE4NS9y/YWYsNzUweDEwMDAs/MDc1LHQsMTAxMDEw/OjAxYzVjYTI3YzYu/anBn" alt="AnarxyCLI Image">
                <div id="gameEmbed" class="game-embed"></div>
            </div>
            <div class="content genre-content" style="display:none;"></div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
